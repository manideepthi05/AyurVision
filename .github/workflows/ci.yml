name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Lint and Code Quality
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  # Job 2: Web Build & Test
  web-build:
    name: Build Web
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Web
        run: npm run web &
        timeout-minutes: 10

      - name: Wait for build completion
        run: sleep 30

  # Job 3: Android Build
  android-build:
    name: Build Android
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Android app with EAS
        run: |
          npm install -g eas-cli
          eas build --platform android --local --wait
        continue-on-error: true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Alternative: Build Android with Expo
        run: npx expo run:android --help
        continue-on-error: true

  # Job 4: iOS Build (macOS only)
  ios-build:
    name: Build iOS
    runs-on: macos-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install dependencies
        run: npm ci

      - name: Build iOS app with EAS
        run: |
          npm install -g eas-cli
          eas build --platform ios --local --wait
        continue-on-error: true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Alternative: Build iOS with Expo
        run: npx expo run:ios --help
        continue-on-error: true

  # Job 5: Backend Server Build & Test
  backend-build:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Check backend syntax
        working-directory: ./server
        run: node -c index.js

      - name: Verify models
        working-directory: ./server
        run: node -c models/Chat.js && node -c models/ScanHistory.js && node -c models/User.js

      - name: Verify routes
        working-directory: ./server
        run: node -c routes/auth.js && node -c routes/chats.js && node -c routes/scans.js

      - name: Verify middleware
        working-directory: ./server
        run: node -c middleware/auth.js

      - name: Start backend server
        working-directory: ./server
        run: npm start &
        env:
          MONGODB_URI: mongodb://root:password@localhost:27017/planty?authSource=admin
          NODE_ENV: test

      - name: Wait for server to start
        run: sleep 5

      - name: Test API connectivity
        run: curl -f http://localhost:3000 || true

  # Job 6: Dependency Check
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Audit backend dependencies
        working-directory: ./server
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # Job 7: Compile TypeScript
  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

  # Job 8: Summary
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, web-build, android-build, ios-build, backend-build, dependency-check, typescript-check]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Web Build: ${{ needs.web-build.result }}"
          echo "Android Build: ${{ needs.android-build.result }}"
          echo "iOS Build: ${{ needs.ios-build.result }}"
          echo "Backend Build: ${{ needs.backend-build.result }}"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "TypeScript Check: ${{ needs.typescript-check.result }}"

      - name: Fail if critical jobs failed
        if: |
          needs.lint.result == 'failure' ||
          needs.backend-build.result == 'failure' ||
          needs.typescript-check.result == 'failure'
        run: exit 1
